<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FlowTask · Smart To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9eef3 0%, #dfe6ed 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* main card */
    .todo-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(0px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header */
    .header {
      background: #1e2b3c;
      padding: 1.6rem 2rem;
      color: white;
    }
    .header h1 {
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .header h1::before {
      content: "✓✓";
      font-size: 1.8rem;
      font-weight: 500;
      opacity: 0.9;
    }
    .sub {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.4rem;
      font-weight: 400;
    }

    /* add task area */
    .add-section {
      padding: 1.8rem 2rem 1rem 2rem;
      background: #ffffff;
      border-bottom: 1px solid #eef2f6;
    }
    .input-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    #taskInput {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 2rem;
      font-size: 1rem;
      transition: 0.2s;
      background: #fefefe;
      outline: none;
    }
    #taskInput:focus {
      border-color: #1e2b3c;
      box-shadow: 0 0 0 3px rgba(30,43,60,0.1);
    }
    .btn-add {
      background: #1e2b3c;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0 1.6rem;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-add:hover {
      background: #0f1e2c;
      transform: scale(0.97);
    }

    /* filter bar & stats */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 2rem;
      background: #f8fafc;
      border-bottom: 1px solid #eef2f6;
    }
    .filter-buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 0.45rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #2c3e4e;
    }
    .filter-btn.active {
      background: #1e2b3c;
      border-color: #1e2b3c;
      color: white;
    }
    .task-stats {
      font-size: 0.8rem;
      background: #eef2ff;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-weight: 500;
      color: #1e2b3c;
    }

    /* task list */
    .task-list-wrapper {
      background: white;
      padding: 0.5rem 0 1.5rem 0;
    }
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 460px;
      overflow-y: auto;
      padding: 0.8rem 2rem 1.2rem 2rem;
    }
    /* custom scroll */
    .task-list::-webkit-scrollbar {
      width: 5px;
    }
    .task-list::-webkit-scrollbar-track {
      background: #eef2f6;
      border-radius: 10px;
    }
    .task-list::-webkit-scrollbar-thumb {
      background: #b9c3ce;
      border-radius: 10px;
    }

    /* task item */
    .task-item {
      background: #ffffff;
      border-radius: 1.4rem;
      padding: 0.9rem 1rem 0.9rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid #edf2f7;
      transition: all 0.2s ease;
    }
    .task-item:hover {
      border-color: #cbdae9;
      background: #fefefe;
      box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
    }
    .task-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      cursor: pointer;
    }
    .task-check {
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 50%;
      background: #f1f5f9;
      border: 2px solid #cbd5e1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      color: white;
      font-size: 0.9rem;
    }
    .task-item.completed .task-check {
      background: #10b981;
      border-color: #10b981;
      content: "✓";
      position: relative;
    }
    .task-item.completed .task-check::after {
      content: "✓";
      font-size: 0.9rem;
      font-weight: bold;
      color: white;
    }
    .task-text {
      font-size: 1rem;
      font-weight: 500;
      color: #1e293b;
      word-break: break-word;
      transition: 0.15s;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #94a3b8;
      font-weight: 400;
    }
    .task-actions {
      display: flex;
      gap: 0.5rem;
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #cbd5e1;
      transition: 0.2s;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:hover {
      background: #fee2e2;
      color: #e53e3e;
      transform: scale(1.05);
    }

    /* empty state */
    .empty-message {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #94a3b8;
      font-weight: 500;
      background: #fafcff;
      border-radius: 2rem;
    }

    /* new feature: progress summary & priority tag */
    .progress-chip {
      margin-top: 0.2rem;
      background: #eef2ff;
      border-radius: 30px;
      padding: 0.2rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* extra new feature: due today hint? we add tiny timestamp */
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: #6c7a91;
      margin-top: 4px;
    }
    .priority-badge {
      background: #f1f3f8;
      border-radius: 20px;
      padding: 0.1rem 0.6rem;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* footer animation */
    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      padding: 1rem;
      background: #f1f5f9;
      color: #5b6e8c;
      border-top: 1px solid #e9edf2;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }
      .add-section, .filter-bar {
        padding: 1rem 1.2rem;
      }
      .task-list {
        padding: 0.5rem 1rem 1rem 1rem;
      }
      .btn-add {
        padding: 0 1.2rem;
      }
      .task-text {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
<div class="todo-container">
  <div class="header">
    <h1>FlowTask</h1>
    <div class="sub">organize · track · thrive</div>
  </div>

  <div class="add-section">
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Write your next task... e.g., 'Review design draft'" autocomplete="off">
      <button class="btn-add" id="addTaskBtn">+ Add Task</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">📋 All</button>
      <button class="filter-btn" data-filter="pending">⏳ Pending</button>
      <button class="filter-btn" data-filter="completed">✅ Completed</button>
    </div>
    <div class="task-stats" id="taskStats">0 tasks</div>
  </div>

  <div class="task-list-wrapper">
    <ul class="task-list" id="taskListContainer">
      <!-- dynamic tasks injected -->
      <li class="empty-message">✨ Your tasks will appear here. Add your first task!</li>
    </ul>
  </div>
  <div class="footer-note">
    ⚡ Changes saved automatically · double-click or click circle to toggle status
  </div>
</div>

<script>
  // ---------- STORAGE KEYS ----------
  const STORAGE_KEY = "flowtask_todos";

  // ---------- GLOBALS ----------
  let tasks = [];           // each task: { id, text, status, createdAt }
  let currentFilter = "all";   // "all", "pending", "completed"

  // DOM elements
  const taskInput = document.getElementById("taskInput");
  const addBtn = document.getElementById("addTaskBtn");
  const taskContainer = document.getElementById("taskListContainer");
  const filterBtns = document.querySelectorAll(".filter-btn");
  const taskStatsSpan = document.getElementById("taskStats");

  // ---------- HELPER: save to localStorage ----------
  function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // ---------- load from localStorage ----------
  function loadFromLocalStorage() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed)) {
          tasks = parsed;
          // ensure every task has 'createdAt' field (migration for older entries + new feature)
          let needsUpdate = false;
          tasks.forEach(task => {
            if (!task.createdAt) {
              task.createdAt = new Date().toISOString();
              needsUpdate = true;
            }
          });
          if (needsUpdate) saveToLocalStorage();
        } else {
          tasks = [];
        }
      } catch(e) { tasks = []; }
    } else {
      // demo initial tasks to show UI richness (fr-1, default pending)
      tasks = [
        { id: Date.now() + 1, text: "Review mini project requirements", status: "pending", createdAt: new Date().toISOString() },
        { id: Date.now() + 2, text: "Design responsive layout", status: "completed", createdAt: new Date(Date.now() - 86400000).toISOString() },
        { id: Date.now() + 3, text: "Implement localStorage persistence", status: "pending", createdAt: new Date().toISOString() }
      ];
      saveToLocalStorage();
    }
  }

  // ---------- helper: format relative date (nice to have) ----------
  function getRelativeDate(isoDate) {
    if (!isoDate) return "";
    const created = new Date(isoDate);
    const now = new Date();
    const diffMs = now - created;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    if (diffDays === 0) return "Today";
    if (diffDays === 1) return "Yesterday";
    if (diffDays < 7) return `${diffDays} days ago`;
    return created.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // get priority preview based on task age or keyword? extra creativity: simple badge
  function getPriorityHint(text, createdAt) {
    if (!text) return "📌";
    const lower = text.toLowerCase();
    if (lower.includes("urgent") || lower.includes("critical") || lower.includes("deadline")) return "🔥 High";
    if (lower.includes("review") || lower.includes("meeting")) return "⭐ Medium";
    return "📌 Low";
  }

  // ---------- render tasks based on currentFilter ----------
  function renderTasks() {
    // filter tasks
    let filteredTasks = [];
    if (currentFilter === "all") {
      filteredTasks = [...tasks];
    } else if (currentFilter === "pending") {
      filteredTasks = tasks.filter(task => task.status === "pending");
    } else if (currentFilter === "completed") {
      filteredTasks = tasks.filter(task => task.status === "completed");
    }

    // update stats (FR-5 satisfaction with counters)
    const total = tasks.length;
    const pendingCount = tasks.filter(t => t.status === "pending").length;
    const completedCount = tasks.filter(t => t.status === "completed").length;
    if (currentFilter === "all") taskStatsSpan.innerText = `${total} total · ${pendingCount} pending · ${completedCount} done`;
    else if (currentFilter === "pending") taskStatsSpan.innerText = `${pendingCount} pending task${pendingCount !== 1 ? 's' : ''}`;
    else taskStatsSpan.innerText = `${completedCount} completed task${completedCount !== 1 ? 's' : ''}`;

    // clear container
    taskContainer.innerHTML = "";

    if (filteredTasks.length === 0) {
      const emptyLi = document.createElement("li");
      emptyLi.className = "empty-message";
      let msg = "✨ No tasks in this view. ";
      if (currentFilter === "pending") msg = "🎉 All done! No pending tasks.";
      else if (currentFilter === "completed") msg = "📭 No completed tasks yet. Finish something!";
      else msg = "➕ Add your first task using the field above.";
      emptyLi.innerText = msg;
      taskContainer.appendChild(emptyLi);
      return;
    }

    // render each task item
    filteredTasks.forEach(task => {
      const li = document.createElement("li");
      li.className = `task-item ${task.status === "completed" ? "completed" : ""}`;
      li.dataset.id = task.id;

      // left side (toggle status via click)
      const taskInfoDiv = document.createElement("div");
      taskInfoDiv.className = "task-info";

      const checkSpan = document.createElement("span");
      checkSpan.className = "task-check";
      // if completed, we style via pseudo-element (css shows checkmark)
      if (task.status === "completed") {
        // ensure pseudo-element shows check, we keep class completed already
        checkSpan.style.setProperty("--check-content", "'✓'");
      } else {
        // empty inner content
      }

      const textWrapper = document.createElement("div");
      textWrapper.style.flex = "1";

      const taskTextSpan = document.createElement("div");
      taskTextSpan.className = "task-text";
      taskTextSpan.innerText = task.text;

      // META section (new extra feature: showing date & priority badge)
      const metaDiv = document.createElement("div");
      metaDiv.className = "task-meta";
      const prioritySpan = document.createElement("span");
      prioritySpan.className = "priority-badge";
      const priorityValue = getPriorityHint(task.text, task.createdAt);
      prioritySpan.innerText = priorityValue;
      const dateSpan = document.createElement("span");
      dateSpan.className = "date-badge";
      dateSpan.innerHTML = `🕒 ${getRelativeDate(task.createdAt)}`;
      metaDiv.appendChild(prioritySpan);
      metaDiv.appendChild(dateSpan);
      
      textWrapper.appendChild(taskTextSpan);
      textWrapper.appendChild(metaDiv);
      taskInfoDiv.appendChild(checkSpan);
      taskInfoDiv.appendChild(textWrapper);

      // actions (delete button)
      const actionsDiv = document.createElement("div");
      actionsDiv.className = "task-actions";
      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.innerHTML = "🗑️";
      deleteBtn.setAttribute("aria-label", "Delete task");
      actionsDiv.appendChild(deleteBtn);

      li.appendChild(taskInfoDiv);
      li.appendChild(actionsDiv);

      // event: toggle status (FR-3) — clicking on check or text area
      taskInfoDiv.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleTaskStatus(task.id);
      });

      // delete event (FR-4)
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        deleteTaskById(task.id);
      });

      taskContainer.appendChild(li);
    });
  }

  // ---------- Toggle task status between pending/completed (FR-3) ----------
  function toggleTaskStatus(id) {
    const taskIndex = tasks.findIndex(t => t.id == id);
    if (taskIndex === -1) return;
    const newStatus = tasks[taskIndex].status === "pending" ? "completed" : "pending";
    tasks[taskIndex].status = newStatus;
    saveToLocalStorage();
    renderTasks();   // re-render with fresh filter
    // visual feedback dynamic (toast-like via subtle animation is ok)
    provideFeedback(`Task marked as ${newStatus === "completed" ? "completed 🎉" : "pending 🔄"}`);
  }

  // ---------- DELETE task (FR-4) ----------
  function deleteTaskById(id) {
    const taskExists = tasks.some(t => t.id == id);
    if (!taskExists) return;
    tasks = tasks.filter(t => t.id != id);
    saveToLocalStorage();
    renderTasks();
    provideFeedback("Task permanently removed");
  }

  // ---------- ADD new task (FR-1) ----------
  function addNewTask() {
    const rawText = taskInput.value.trim();
    if (rawText === "") {
      provideFeedback("⚠️ Please write a task description", true);
      return;
    }
    // FR-1 default status "pending"
    const newTask = {
      id: Date.now(),
      text: rawText,
      status: "pending",
      createdAt: new Date().toISOString()
    };
    tasks.push(newTask);
    saveToLocalStorage();
    taskInput.value = "";
    // after adding, reset filter to "all" to show it (better UX)
    if (currentFilter !== "all") {
      currentFilter = "all";
      updateActiveFilterUI();
    }
    renderTasks();
    provideFeedback(`✨ "${rawText}" added!`);
    // scroll to bottom of list? nice but not mandatory
    taskContainer.scrollTop = taskContainer.scrollHeight;
  }

  // ---------- Filter change (FR-5) ----------
  function setFilter(filterType) {
    if (filterType !== "all" && filterType !== "pending" && filterType !== "completed") return;
    currentFilter = filterType;
    updateActiveFilterUI();
    renderTasks();
    provideFeedback(`Filter: ${filterType === "all" ? "showing all tasks" : filterType === "pending" ? "only pending tasks" : "only completed tasks"}`);
  }

  function updateActiveFilterUI() {
    filterBtns.forEach(btn => {
      const filterVal = btn.getAttribute("data-filter");
      if (filterVal === currentFilter) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }

  // simple non-intrusive feedback (NFR-3)
  let feedbackTimeout;
  function provideFeedback(message, isError = false) {
    // create or reuse floating feedback element
    let feedbackEl = document.getElementById("dynamic-feedback-toast");
    if (!feedbackEl) {
      feedbackEl = document.createElement("div");
      feedbackEl.id = "dynamic-feedback-toast";
      feedbackEl.style.position = "fixed";
      feedbackEl.style.bottom = "24px";
      feedbackEl.style.left = "50%";
      feedbackEl.style.transform = "translateX(-50%)";
      feedbackEl.style.background = "#1e2b3c";
      feedbackEl.style.color = "white";
      feedbackEl.style.padding = "0.6rem 1.2rem";
      feedbackEl.style.borderRadius = "50px";
      feedbackEl.style.fontSize = "0.85rem";
      feedbackEl.style.fontWeight = "500";
      feedbackEl.style.boxShadow = "0 6px 14px rgba(0,0,0,0.15)";
      feedbackEl.style.zIndex = "999";
      feedbackEl.style.backdropFilter = "blur(4px)";
      feedbackEl.style.backgroundColor = "rgba(30,43,60,0.92)";
      feedbackEl.style.pointerEvents = "none";
      document.body.appendChild(feedbackEl);
    }
    if (isError) {
      feedbackEl.style.backgroundColor = "#c2410c";
    } else {
      feedbackEl.style.backgroundColor = "#1e2b3c";
    }
    feedbackEl.textContent = message;
    feedbackEl.style.opacity = "1";
    clearTimeout(feedbackTimeout);
    feedbackTimeout = setTimeout(() => {
      feedbackEl.style.opacity = "0";
      setTimeout(() => {
        if (feedbackEl && feedbackEl.parentNode) feedbackEl.remove();
      }, 300);
    }, 1800);
  }

  // -------- additional nice to have: keyboard support (enter to add) --------
  function initEventListeners() {
    addBtn.addEventListener("click", addNewTask);
    taskInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addNewTask();
      }
    });

    filterBtns.forEach(btn => {
      btn.addEventListener("click", (e) => {
        const filterValue = btn.getAttribute("data-filter");
        setFilter(filterValue);
      });
    });
  }

  // responsiveness & first load 
  function init() {
    loadFromLocalStorage();
    initEventListeners();
    // set currentFilter = all
    currentFilter = "all";
    updateActiveFilterUI();
    renderTasks();
  }

  // start app
  init();
</script>
</body>
</html>
