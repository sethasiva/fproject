<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Task Manager</h1>

    <!-- INPUT -->
    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter task...">
      <button onclick="addTask()">Add</button>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button data-filter="all" onclick="setFilter('all')">All</button>
      <button data-filter="pending" onclick="setFilter('pending')">Pending</button>
      <button data-filter="completed" onclick="setFilter('completed')">Completed</button>
    </div>

    <!-- TASK LIST -->
    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
