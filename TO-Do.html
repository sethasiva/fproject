<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Smart Todo Application</title>
    <link rel="stylesheet" href="To-Do.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="app-container">
        
            <header class="app-header">
                <div class="logo-area">
                    <span class="logo-icon">✓</span>
                    <h1>TaskFlow</h1>
                </div>
                <p class="tagline">Organize your day.</p>
            </header>

           
            <section class="add-task-section">
                <div class="input-wrapper">
                    <input type="text" id="taskInput" placeholder="Enter Your Tasks." autocomplete="off">
                    <button id="addTaskBtn" class="add-btn">
                        <span>+</span> Add Task
                    </button>
                </div>
            </section>

           
            <section class="filter-section">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All Tasks</button>
                    <button class="filter-tab" data-filter="pending">Pending</button>
                    <button class="filter-tab" data-filter="completed">Completed</button>
                </div>
                <div class="stats-display" id="statsDisplay">
                    <span id="taskCount">0</span> tasks
                </div>
            </section>

          
            <section class="tasks-container">
                <ul id="taskList" class="task-list">
                    <li class="empty-state">
                    
                        <p>Your task list is empty</p>
                        <small>Add a task using the input above</small>
                    </li>
                </ul>
            </section>

           
            <footer class="app-footer">
                <p>All changes saved automatically</p>
            </footer>
        </div>
    </div>

    <script src="To-Do.js"></script>
</body>
</html>
