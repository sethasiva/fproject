
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
  body {
  font-family: "Inter", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  color: #0f172a;
  background: #f8fafc;
  margin: 0;
}
h1, h2, h3 { 
  line-height: 1.2;
  margin: 0 0 .75em;
}
p { 
  font-size: 1.125rem;
  line-height: 1.7;
  margin: 0 0 1.5em;
}
a {
  color: #2563eb;
  text-decoration: none;
}
a:hover { text-decoration: underline; }
h1 { font-size: clamp(2.5rem, 5vw, 3.5rem); }
h2 { font-size: 2rem; }
header.hero, main, footer.site-footer, section { padding: 16px; }
.hero {
  text-align:center;
  padding:80px 24px;
  background:#f1f8f5;
  color:#0f172a
}
.hero .subhead {
  color:#475569;
  font-size:1.125rem;
  margin:12px 0 24px
}
.btn {
  display:inline-block;
  padding:12px 18px;
  border-radius:999px
}
.btn-primary {
  background:#0f766e;
  color:#fff;
}

    </style>
</head>
<body>
  <header class="hero">
    <h1>Grow faster with Acme</h1>
    <p class="subhead"> Responsive landing page </p>
    <a class="btn btn-primary" href="#pricing">Start Free Trial</a>
  </header>
  <main>
    <section class="features"></section>
    <section class="testimonials"></section>
    <section class="pricing"></section>
    <section class="faq"></section>
  </main>
  <footer class="site-footer"></footer>
</body>
</html>
